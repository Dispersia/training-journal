name: training_journal
description: A tracking app for climbing and lifting

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=2.7.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^6.1.1
  auto_route: ^0.6.9

  blocs:
    path: ../blocs
  repositories:
    path: ../repositories

dev_dependencies:
  auto_route_generator: ^0.6.9
  build_runner: ^1.11.1
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
